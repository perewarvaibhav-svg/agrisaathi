services:
  - type: web
    name: agrisaathi-backend
    env: python
    buildCommand: pip install -r mlbackend/requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker mlbackend.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # User will need to add these secret keys in the Render Dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: DATA_GOV_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SENTINEL_CLIENT_ID
        sync: false
      - key: SENTINEL_CLIENT_SECRET
        sync: false
